<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barey Digital</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f2f4f8;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:linear-gradient(90deg,#0b1e4f,#2f6bff);
color:white;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:50px;
height:50px;
border-radius:50%;
background:white;
padding:5px;
object-fit:contain;
}

nav a{
margin:0 10px;
cursor:pointer;
}

.admin{
background:transparent;
border:1px solid white;
padding:8px 15px;
border-radius:20px;
color:white;
}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:60px;
background:linear-gradient(135deg,#0b1e4f,#3c7bff);
color:white;
}

.hero h1{
font-size:45px;
margin:0;
}

.search{
margin-top:20px;
display:flex;
background:white;
border-radius:30px;
overflow:hidden;
}

.search input{
border:none;
padding:10px;
width:200px;
}

.search button{
border:none;
background:#2f6bff;
color:white;
padding:10px;
}

.hero img{
width:250px;
border-radius:20px;
}

/* PRODUCTS */
.products{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
}

.card button{
background:#2f6bff;
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* OFFER */
.offer{
margin:40px;
padding:30px;
background:linear-gradient(90deg,#ff6a00,#ff3c00);
color:white;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.offer button{
background:white;
color:#ff3c00;
border:none;
padding:10px 20px;
border-radius:20px;
}

/* INSTAGRAM */
.instagram{
padding:40px;
}

.instagram img{
width:100%;
border-radius:15px;
}
</style>
</head>

<body>

<header>

<div class="logo">
<img src="https://i.ibb.co/xxxxx/logo.png">
<b>BAREY DIGITAL</b>
</div>

<nav>
<a href="#productos">Celulares</a>
<a href="#accesorios">Accesorios</a>
<a href="#ofertas">Ofertas</a>
</nav>

<button class="admin">Admin</button>

</header>

<section class="hero">

<div>
<h1>Tecnología con carácter 🐶</h1>
<p>Los mejores smartphones al mejor precio</p>

<div class="search">
<input placeholder="Buscar celular...">
<button>🔍</button>
</div>
</div>

<img src="https://images.unsplash.com/photo-1678911820864-e0c0f8c7a5d2">

</section>

<section id="productos" class="products">

<h2>Celulares</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1695048133145-5c6c5b2c8c3c">
<h3>iPhone 15 Pro</h3>
<p>$1.200.000</p>
<button onclick="whatsapp('iPhone 15 Pro')">Consultar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1678911820864-e0c0f8c7a5d2">
<h3>Samsung S23 Ultra</h3>
<p>$980.000</p>
<button onclick="whatsapp('Samsung S23 Ultra')">Consultar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1610945265064-0e34e5519bbf">
<h3>Motorola Edge 40</h3>
<p>$650.000</p>
<button onclick="whatsapp('Motorola Edge 40')">Consultar</button>
</div>

</div>

</section>

<section id="ofertas" class="offer">

<div>
<h2>Ofertas destacadas</h2>
<p>Descuentos por tiempo limitado</p>
</div>

<button>Ver ofertas</button>

</section>

<section class="instagram">

<h2>Instagram</h2>

<div class="grid">

<img src="https://images.unsplash.com/photo-1510557880182-3b3a6d6c2c9b">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<img src="https://images.unsplash.com/photo-1603899122475-6f4b94c5d7a2">

</div>

</section>

<script>

function whatsapp(name){
let text = encodeURIComponent("Hola! Quiero consultar por "+name)
window.open("https://wa.me/541161725201?text="+text)
}

</script>

</body>
</html>
